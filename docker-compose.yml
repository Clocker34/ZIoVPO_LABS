# Локальная PostgreSQL для разработки. Запуск: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: adboard-postgres
    environment:
      POSTGRES_DB: adboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adboard_local}
    # Если 5432 занят локальным PostgreSQL — используем 5433 на хосте
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adboard"]
      interval: 3s
      timeout: 5s
      retries: 10
