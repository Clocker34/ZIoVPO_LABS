# Локальная PostgreSQL для разработки. Запуск: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: adboard-postgres
    environment:
      POSTGRES_DB: adboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adboard123}
    # Если локальный PostgreSQL уже слушает 5432/5433 — используем 54333 на хосте
    ports:
      - "${POSTGRES_HOST_PORT:-54333}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adboard"]
      interval: 3s
      timeout: 5s
      retries: 10
