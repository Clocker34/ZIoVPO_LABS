spring.application.name=adboard

# Лицензии: тикет; ЭЦП RSA. В проде задайте ключи (PKCS#8 DER Base64); в CI/GitHub/GitLab см. переменные LICENSE_SIGNATURE_* в .env.example.
license.ticket.lifetime-seconds=${LICENSE_TICKET_LIFETIME_SECONDS:300}
license.signature.private-key-base64=${LICENSE_SIGNATURE_PRIVATE_KEY_BASE64:}
license.signature.public-key-base64=${LICENSE_SIGNATURE_PUBLIC_KEY_BASE64:}

# JWT (задание 5): в проде задайте JWT_SECRET; секрет ≥ 32 символа для HS256
jwt.secret=${JWT_SECRET:adboard-jwt-dev-secret-must-be-at-least-32-chars!}
jwt.access-expiration-ms=${JWT_ACCESS_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_MS:604800000}
# По умолчанию 8082: 8081 часто занят повторным запуском. Нужен 8081 — задайте SERVER_PORT=8081
server.port=${SERVER_PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/adboard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
# Пустой SPRING_DATASOURCE_PASSWORD в IDE — ошибка SCRAM. Локальный дефолт = пароль из docker-compose; в проде задайте переменную окружения.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:adboard123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Первый администратор (создаётся один раз, если в БД ещё нет такого username). В проде задайте ADBOARD_BOOTSTRAP_ADMIN_*.
adboard.bootstrap.admin.username=${ADBOARD_BOOTSTRAP_ADMIN_USERNAME:admin}
adboard.bootstrap.admin.password=${ADBOARD_BOOTSTRAP_ADMIN_PASSWORD:ChangeMe1!}

# schema.sql — правка старых строк в users до ddl-auto (иначе NOT NULL на password_hash/username/role падает)
# Один оператор на весь файл: «;» режет DO $$; если задать разделитель, которого нет в тексте — Spring подставляет \n и режет по строкам (ломает DO $$).
spring.sql.init.separator=^^^ END OF SCRIPT ^^^
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect