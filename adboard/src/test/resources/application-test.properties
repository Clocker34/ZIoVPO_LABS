jwt.secret=test-jwt-secret-key-at-least-32-characters-long!
jwt.access-expiration-ms=3600000
jwt.refresh-expiration-ms=7200000

spring.datasource.url=jdbc:h2:mem:adboardtest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Явно переопределяем main application.properties (PostgreSQLDialect), иначе Instant/timestamp в H2 читаются неверно и refresh считает сессию просроченной.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# bootstrap-админ не создаётся в тестах
adboard.bootstrap.admin.username=
adboard.bootstrap.admin.password=
